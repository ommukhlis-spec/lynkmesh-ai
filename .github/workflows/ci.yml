name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    name: Python ${{ matrix.python-version }} -- ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e .

      - name: Import check
        run: python -c "import lynkmesh_ai; print(f'lynkmesh_ai v{lynkmesh_ai.__version__}')"

      - name: CLI help
        run: lynkmesh-ai --help

      - name: Scan smoke test
        run: lynkmesh-ai scan --dir examples/sample_project

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff (check only)
        run: ruff check lynkmesh_ai/ --output-format=github || true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for secrets in source
        run: |
          echo "Scanning for potential secrets..."
          ! grep -rnE "(api[_-]?key\s*[:=]\s*[\"'']\s*[A-Za-z0-9_\-]{20,}|sk-[A-Za-z0-9]{32,}|ghp_[A-Za-z0-9]{36,}|xox[baprs]-[A-Za-z0-9]+)" lynkmesh_ai/ examples/ || echo "No secrets found."
